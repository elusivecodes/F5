<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="dist/f5.js"></script>
</head>

<body>
    <canvas id="canvas" tabindex="1"></canvas>
    <script>
        class Sketch extends F5 {

            update() {
                this.canvas.background('#333');

                // Path

                const path = this.canvas.createPath();
                path.ellipse(300, 200, 300, 200);

                const contour = path.createContour();
                contour.ellipse(300, 200, 150, 150);

                const innerContour = contour.createContour();
                innerContour.rect(250, 150, 100, 100);

                // Test

                const mousePos = this.input.mousePos();

                let fillColor = 'blue';
                let testPath;

                if (mousePos) {
                    testPath = this.canvas.createPath(mousePos.x, mousePos.y);
                    testPath.ellipse(0, 0, 10, 10)

                    if (path.intersects(testPath)) {
                        fillColor = 'red';
                    }
                }

                this.canvas.fillColor(fillColor);
                this.canvas.drawPath(path);

                if (testPath) {
                    this.canvas.fillColor('white');
                    this.canvas.drawPath(testPath);
                }
            }

        }

        const canvas = document.getElementById('canvas');
        const sketch = new Sketch(canvas);
    </script>
</body>

</html>
